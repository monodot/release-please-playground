name: Lint PR title

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title is a conventional commit
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|docs|chore|refactor|test|ci)\((runner|frontend|library)\)!?: .+'
          if ! [[ "$TITLE" =~ $pattern ]]; then
            echo "::error::PR title does not match the conventional commit format."
            echo "Got:      $TITLE"
            echo "Expected: <type>(<scope>): <description>"
            echo "  type:   feat | fix | docs | chore | refactor | test | ci"
            echo "  scope:  runner | frontend | library"
            echo "  add '!' before the colon for a breaking change"
            exit 1
          fi
          echo "OK: $TITLE"
